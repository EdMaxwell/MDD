spring:
  application:
    name: mdd
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/mdd}
    username: ${DB_USERNAME:mdd}
    password: ${DB_PASSWORD:mdd_password}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  jackson:
    default-property-inclusion: non_null

app:
  security:
    jwt:
      secret: ${JWT_SECRET:VGhpc0lzQURldmVsb3BtZW50S2V5VGhhdE11c3RCZUF0TGVhc3QzMkJ5dGVzTG9uZw==}
      expiration: ${JWT_EXPIRATION:3600000}
