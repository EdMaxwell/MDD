<main class="topics-shell">
  <section class="topics-page">
    <div class="topics-topbar">
      <app-topbar />
    </div>

    @if (loadingTopics()) {
      <section class="topics-state">
        <p>Chargement des themes...</p>
      </section>
    } @else if (topics().length) {
      @if (topicsError()) {
        <p class="topics-feedback">{{ topicsError() }}</p>
      }

      <section class="topics-grid" aria-label="Liste des themes">
        @for (topic of topics(); track topic.id) {
          <app-topic-card
            [topic]="topic"
            [loading]="isUpdating(topic.id)"
            (subscribe)="subscribe($event)"
          />
        }
      </section>
    } @else if (topicsError()) {
      <section class="topics-state topics-state-error">
        <p>{{ topicsError() }}</p>
      </section>
    } @else {
      <section class="topics-state">
        <p>Aucun theme a afficher pour le moment.</p>
      </section>
    }
  </section>
</main>
