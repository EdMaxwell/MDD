<main class="article-shell">
  <section class="article-page">
    <div class="article-topbar">
      <app-topbar />
    </div>

    <section class="create-content">
      <button type="button" class="back-button" aria-label="Retour aux articles" (click)="goBack()">
        <span aria-hidden="true">&larr;</span>
      </button>

      <form class="article-form" [formGroup]="form" (ngSubmit)="submit()">
        <h1>Creer un nouvel article</h1>

        <label>
          <span class="sr-only">Theme</span>
          <select formControlName="topicId">
            <option value="" disabled>Selectionner un theme</option>
            @for (topic of topics(); track topic.id) {
              <option [value]="topic.id">{{ topic.name }}</option>
            }
          </select>
          @if (form.controls.topicId.touched && form.controls.topicId.invalid) {
            <small>Selectionne un theme.</small>
          }
        </label>

        <label>
          <span class="sr-only">Titre</span>
          <input type="text" formControlName="title" placeholder="Titre de l'article" maxlength="180" />
          @if (form.controls.title.touched && form.controls.title.invalid) {
            <small>Le titre est obligatoire.</small>
          }
        </label>

        <label>
          <span class="sr-only">Contenu</span>
          <textarea formControlName="content" placeholder="Contenu de l'article"></textarea>
          @if (form.controls.content.touched && form.controls.content.invalid) {
            <small>Le contenu est obligatoire.</small>
          }
        </label>

        @if (feedback()) {
          <p class="feedback">{{ feedback() }}</p>
        }

        <app-ui-button buttonType="submit" [disabled]="loadingTopics() || submitting()">
          @if (submitting()) {
            Creation...
          } @else {
            Creer
          }
        </app-ui-button>
      </form>
    </section>
  </section>
</main>
